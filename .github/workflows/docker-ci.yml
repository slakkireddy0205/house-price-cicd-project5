name: Docker Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t house-price-api .

      - name: Run container
        run: docker run -d -p 8000:8000 --name test-container house-price-api

      - name: Wait for app to start
        run: sleep 5

      - name: Test root endpoint
        run: curl --fail http://localhost:8000/

      - name: Test predict endpoint
        run: |
          curl --fail -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"area": 6000, "bedrooms": 3, "bathrooms": 2, "stories": 2, "mainroad": "yes", "guestroom": "no", "basement": "yes", "hotwaterheating": "no", "airconditioning": "yes", "parking": 1, "prefarea": "yes", "furnishingstatus": "semi-furnished"}'

      - name: Stop container
        run: docker stop test-container